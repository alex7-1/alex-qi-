<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>合同信息收集 · Alex Qi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #F0F5F1;
  min-height: 100vh;
  padding: 20px 16px 40px;
  -webkit-font-smoothing: antialiased;
}

/* 品牌头部 */
.brand-header {
  text-align: center;
  margin-bottom: 16px;
  padding: 20px 16px 16px;
  background: #1F3024;
  border-radius: 14px;
}
.brand-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto 10px;
  border: 2px solid #3D5A45;
}
.brand-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center 25%; }
.brand-name { font-size: 16px; font-weight: 500; color: #FFFFFF; letter-spacing: 1px; margin-bottom: 4px; }
.brand-tag {
  display: inline-block; padding: 2px 10px;
  background: #3D5A45; color: #E8EFE9;
  font-size: 10px; letter-spacing: 2px; border-radius: 3px; margin-bottom: 10px;
}
.brand-title { font-size: 15px; color: #FFFFFF; font-weight: 500; letter-spacing: 1px; }

/* 业务类型切换 */
.type-switcher {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.type-btn {
  padding: 12px 8px;
  background: #FFFFFF;
  border: 1.5px solid #C9D6CB;
  border-radius: 10px;
  font-size: 13px;
  color: #3D5A45;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  line-height: 1.4;
  transition: all 0.15s;
}
.type-btn .type-main { font-size: 14px; font-weight: 500; display: block; color: #1F3024; }
.type-btn .type-sub { font-size: 11px; color: #7A9680; margin-top: 2px; display: block; }
.type-btn.active {
  background: #1F3024;
  border-color: #1F3024;
}
.type-btn.active .type-main { color: #FFFFFF; }
.type-btn.active .type-sub { color: #B5C4B7; }

/* 安全说明 */
.security-box {
  background: #E8EFE9;
  border: 1px solid #C9D6CB;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 16px;
}
.security-top {
  display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px;
}
.security-icon {
  flex-shrink: 0; width: 20px; height: 20px;
  background: #1F3024; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #FFFFFF; font-weight: 500; margin-top: 1px;
}
.security-main { font-size: 12px; color: #1F3024; line-height: 1.7; }
.security-main b { font-weight: 500; }
.security-law {
  background: #FFFFFF;
  border: 0.5px solid #C9D6CB;
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 11px;
  color: #3D5A45;
  line-height: 1.7;
}
.security-law .law-ref { font-weight: 500; color: #1F3024; }
.security-company {
  font-size: 11px; color: #7A9680; margin-top: 8px; line-height: 1.5;
}

/* 表单区块 */
.form-section {
  background: #FFFFFF;
  border-radius: 12px;
  border: 0.5px solid #C9D6CB;
  margin-bottom: 12px;
  overflow: hidden;
}
.form-section-title {
  background: #1F3024; color: #FFFFFF;
  font-size: 11.5px; font-weight: 500;
  letter-spacing: 2px; padding: 8px 16px;
}
.form-row {
  display: flex; align-items: center;
  padding: 11px 16px;
  border-bottom: 0.5px solid #F0F5F1;
  gap: 10px;
}
.form-row:last-child { border-bottom: none; }
.form-label {
  flex-shrink: 0; width: 88px;
  font-size: 12.5px; color: #3D5A45; line-height: 1.4;
}
.form-label .req { color: #C0392B; margin-left: 2px; }
.form-label .opt { color: #B5C4B7; font-size: 10.5px; margin-left: 2px; }
.form-input {
  flex: 1; border: none; outline: none;
  font-size: 13px; color: #1F3024;
  font-family: inherit; background: transparent; padding: 0; min-width: 0;
}
.form-input::placeholder { color: #C9D6CB; }
.form-input:disabled { opacity: 0.35; }

/* 性别按钮 */
.gender-group { display: flex; gap: 8px; flex: 1; }
.gender-btn {
  flex: 1; padding: 7px 0;
  border: 1px solid #C9D6CB; border-radius: 6px;
  font-size: 12.5px; color: #3D5A45;
  background: #FFFFFF; cursor: pointer;
  text-align: center; font-family: inherit; transition: all 0.15s;
}
.gender-btn.active { background: #1F3024; color: #FFFFFF; border-color: #1F3024; }

/* 已发给Alex的勾选行 */
.sent-row {
  padding: 10px 16px;
  border-bottom: 0.5px solid #F0F5F1;
  background: #FAFBFA;
}
.sent-check-label {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  font-size: 12px; color: #7A9680;
}
.sent-check-label input[type="checkbox"] {
  width: 15px; height: 15px;
  accent-color: #1F3024; cursor: pointer; flex-shrink: 0;
}
.sent-check-label .sent-text { line-height: 1.4; }
.sent-check-label .sent-text b { font-weight: 500; color: #3D5A45; font-size: 11.5px; }

/* IBAN 区域 */
.iban-toggle-row {
  padding: 11px 16px;
  border-bottom: 0.5px solid #F0F5F1;
}
.iban-toggle-label {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.iban-toggle-label input[type="checkbox"] {
  width: 15px; height: 15px; accent-color: #1F3024; cursor: pointer;
}
.iban-toggle-label span { font-size: 12.5px; color: #3D5A45; }
.iban-toggle-label .iban-opt { font-size: 11px; color: #B5C4B7; margin-left: auto; }

/* 提交区 */
.submit-btn {
  width: 100%; padding: 15px;
  background: #1F3024; color: #FFFFFF;
  border: none; border-radius: 12px;
  font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  letter-spacing: 1px; margin-bottom: 12px;
}
.submit-btn:active { opacity: 0.85; }

/* 错误提示 */
.error-tip {
  display: none;
  background: #FEF0EF; border: 1px solid #F5C6C3;
  border-radius: 8px; padding: 10px 14px;
  font-size: 12.5px; color: #C0392B;
  margin-bottom: 12px; text-align: center;
}

/* 结果卡片 */
.result-card {
  display: none;
  background: #FFFFFF; border-radius: 12px;
  border: 0.5px solid #C9D6CB; overflow: hidden; margin-bottom: 12px;
}
.result-title {
  background: #1F3024; color: #FFFFFF;
  font-size: 11.5px; font-weight: 500;
  letter-spacing: 2px; padding: 8px 16px;
}
.result-body {
  padding: 14px 16px; font-size: 13px;
  color: #1F3024; line-height: 2;
  white-space: pre-wrap; word-break: break-all;
}
.copy-btn {
  width: 100%; padding: 14px;
  background: #3D5A45; color: #FFFFFF;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  letter-spacing: 1px; display: none;
}
.copy-btn:active { opacity: 0.85; }
.copy-success { background: #2A5C36; }
.footer { text-align: center; font-size: 10.5px; color: #7A9680; letter-spacing: 2px; margin-top: 10px; }
</style>
</head>
<body>

<!-- 品牌头部 -->
<div class="brand-header">
  <div class="brand-avatar"><img id="avatarImg" src="" alt="Alex Qi"></div>
  <div class="brand-name">Alex Qi</div>
  <div class="brand-tag">合同严选</div>
  <div class="brand-title">合同信息收集</div>
</div>

<!-- 业务类型切换 -->
<div class="type-switcher">
  <button class="type-btn active" id="btn-energy" onclick="switchType('energy')">
    <span class="type-main">电 / 气</span>
    <span class="type-sub">IBAN 选填</span>
  </button>
  <button class="type-btn" id="btn-network" onclick="switchType('network')">
    <span class="type-main">网络</span>
    <span class="type-sub">IBAN 必填</span>
  </button>
</div>

<!-- 安全说明 -->
<div class="security-box">
  <div class="security-top">
    <div class="security-icon">🔒</div>
    <div class="security-main">
      以下信息<b>仅用于本次合同的签署与履行</b>，处理依据如下：
    </div>
  </div>
  <div class="security-law">
    <span class="law-ref">DSGVO Art. 6 Abs. 1 lit. b</span>：个人数据的处理仅在履行合同所必要的范围内进行，不得用于任何合同目的之外的用途。
  </div>
  <div class="security-company">挂靠德国合规团队 Chen Coaching · manyreason，身份可查证</div>
</div>

<!-- 个人信息 -->
<div class="form-section">
  <div class="form-section-title">个人信息</div>
  <div class="form-row">
    <div class="form-label">性别<span class="req">*</span></div>
    <div class="gender-group">
      <button class="gender-btn" data-value="Herr" onclick="selectGender(this)">男 (Herr)</button>
      <button class="gender-btn" data-value="Frau" onclick="selectGender(this)">女 (Frau)</button>
    </div>
  </div>
  <div class="form-row">
    <div class="form-label">姓<span class="req">*</span></div>
    <input class="form-input" id="f-lastname" type="text" placeholder="Nachname">
  </div>
  <div class="form-row">
    <div class="form-label">名<span class="req">*</span></div>
    <input class="form-input" id="f-firstname" type="text" placeholder="Vorname">
  </div>
  <div class="form-row">
    <div class="form-label">出生日期<span class="req">*</span></div>
    <input class="form-input" id="f-dob" type="text" placeholder="TT.MM.JJJJ" inputmode="numeric">
  </div>
  <div class="form-row">
    <div class="form-label">邮箱<span class="req">*</span></div>
    <input class="form-input" id="f-email" type="email" placeholder="beispiel@email.com" inputmode="email">
  </div>
  <div class="form-row">
    <div class="form-label">手机号<span class="req">*</span></div>
    <input class="form-input" id="f-phone" type="tel" placeholder="+49 ..." inputmode="tel">
  </div>
</div>

<!-- 居住地址 -->
<div class="form-section">
  <div class="form-section-title">居住地址</div>
  <div class="form-row">
    <div class="form-label">街道名称<span class="req">*</span></div>
    <input class="form-input" id="f-street" type="text" placeholder="Straße">
  </div>
  <div class="form-row">
    <div class="form-label">门牌号<span class="req">*</span></div>
    <input class="form-input" id="f-number" type="text" placeholder="Hausnummer">
  </div>
  <div class="form-row">
    <div class="form-label">邮政编码<span class="req">*</span></div>
    <input class="form-input" id="f-plz" type="text" placeholder="52062" inputmode="numeric" maxlength="5">
  </div>
  <div class="form-row">
    <div class="form-label">城市<span class="req">*</span></div>
    <input class="form-input" id="f-city" type="text" placeholder="Stadt">
  </div>
</div>

<!-- 合同专属信息（电气/网络动态显示） -->
<div class="form-section" id="section-contract">
  <div class="form-section-title" id="contract-title">电 / 气合同信息</div>

  <!-- 电表号（仅电气显示） -->
  <div id="block-zaehler">
    <div class="sent-row">
      <label class="sent-check-label" for="check-zaehler">
        <input type="checkbox" id="check-zaehler" onchange="toggleSent('zaehler', this)">
        <span class="sent-text"><b>电表号 (Zählernummer)</b> 已发给 Alex · 无需填写</span>
      </label>
    </div>
    <div class="form-row" id="row-zaehler">
      <div class="form-label">电表号<span class="opt">选填</span></div>
      <input class="form-input" id="f-zaehler" type="text" placeholder="Zählernummer">
    </div>
  </div>

  <!-- Marktlokations-ID（仅电气显示） -->
  <div id="block-malo">
    <div class="sent-row">
      <label class="sent-check-label" for="check-malo">
        <input type="checkbox" id="check-malo" onchange="toggleSent('malo', this)">
        <span class="sent-text"><b>Marktlokations-ID</b> 已发给 Alex · 无需填写</span>
      </label>
    </div>
    <div class="form-row" id="row-malo">
      <div class="form-label"><span style="font-size:11px;">MaLo-ID</span><span class="opt">选填</span></div>
      <input class="form-input" id="f-malo" type="text" placeholder="Marktlokations-ID">
    </div>
  </div>
</div>

<!-- 银行信息 -->
<div class="form-section">
  <div class="form-section-title">银行信息</div>

  <!-- 电气版：勾选框 -->
  <div id="iban-toggle-row" class="iban-toggle-row">
    <label class="iban-toggle-label" for="iban-check">
      <input type="checkbox" id="iban-check" onchange="toggleIban(this)">
      <span>使用 IBAN 自动扣款</span>
      <span class="iban-opt">选填</span>
    </label>
  </div>

  <!-- 网络版提示（必填说明） -->
  <div id="iban-required-note" style="display:none; padding:10px 16px 4px; font-size:11.5px; color:#C0392B;">
    网络合同需要 IBAN 用于月费自动扣款
  </div>

  <div class="form-row" id="iban-row" style="display:none;">
    <div class="form-label" id="iban-label">IBAN</div>
    <input class="form-input" id="f-iban" type="text" placeholder="DE89 3704 0044 0532 0130 00" autocomplete="off">
  </div>
</div>

<button class="submit-btn" onclick="submitForm()">生成信息 · 发给 Alex</button>
<div class="error-tip" id="errorTip"></div>

<!-- 结果 -->
<div class="result-card" id="resultCard">
  <div class="result-title">请复制以下内容发给 Alex</div>
  <div class="result-body" id="resultText"></div>
</div>
<button class="copy-btn" id="copyBtn" onclick="copyResult()">一键复制 · 发给 Alex</button>

<div class="footer">ALEX QI · 合同严选</div>

let currentType = 'energy';
let selectedGender = '';

// ===== 业务类型切换 =====
function switchType(type) {
  currentType = type;
  document.getElementById('btn-energy').classList.toggle('active', type === 'energy');
  document.getElementById('btn-network').classList.toggle('active', type === 'network');

  const isEnergy = type === 'energy';

  // 合同标题
  document.getElementById('contract-title').textContent = isEnergy ? '电 / 气合同信息' : '网络合同信息';

  // 电气专属字段（电表号、MaLo-ID）仅电气显示
  document.getElementById('block-zaehler').style.display = isEnergy ? '' : 'none';
  document.getElementById('block-malo').style.display = isEnergy ? '' : 'none';

  // IBAN 控制
  const ibanToggleRow = document.getElementById('iban-toggle-row');
  const ibanRequiredNote = document.getElementById('iban-required-note');
  const ibanRow = document.getElementById('iban-row');
  const ibanLabel = document.getElementById('iban-label');
  const ibanCheck = document.getElementById('iban-check');

  if (isEnergy) {
    // 电气：IBAN 选填，勾选框控制
    ibanToggleRow.style.display = '';
    ibanRequiredNote.style.display = 'none';
    ibanRow.style.display = ibanCheck.checked ? 'flex' : 'none';
    ibanLabel.innerHTML = 'IBAN';
  } else {
    // 网络：IBAN 必填，直接显示
    ibanToggleRow.style.display = 'none';
    ibanRequiredNote.style.display = '';
    ibanRow.style.display = 'flex';
    ibanLabel.innerHTML = 'IBAN<span style="color:#C0392B;margin-left:2px;">*</span>';
  }
}

// ===== 性别选择 =====
function selectGender(btn) {
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedGender = btn.dataset.value;
}

// ===== 已发给Alex勾选 =====
function toggleSent(field, cb) {
  const row = document.getElementById('row-' + field);
  const input = document.getElementById('f-' + field);
  if (cb.checked) {
    row.style.display = 'none';
    input.value = '__已发给Alex__';
  } else {
    row.style.display = 'flex';
    input.value = '';
  }
}

// ===== IBAN 勾选（电气版） =====
function toggleIban(cb) {
  const row = document.getElementById('iban-row');
  row.style.display = cb.checked ? 'flex' : 'none';
  if (!cb.checked) document.getElementById('f-iban').value = '';
}

// ===== 验证 =====
function validate() {
  if (!selectedGender) { showError('请选择性别'); return false; }

  const required = [
    { id: 'f-lastname', label: '姓' },
    { id: 'f-firstname', label: '名' },
    { id: 'f-dob', label: '出生日期' },
    { id: 'f-email', label: '邮箱' },
    { id: 'f-phone', label: '手机号' },
    { id: 'f-street', label: '街道名称' },
    { id: 'f-number', label: '门牌号' },
    { id: 'f-plz', label: '邮政编码' },
    { id: 'f-city', label: '城市' },
  ];

  for (const f of required) {
    if (!document.getElementById(f.id).value.trim()) {
      showError('请填写「' + f.label + '」');
      document.getElementById(f.id).focus();
      return false;
    }
  }

  // 网络版 IBAN 必填
  if (currentType === 'network' && !document.getElementById('f-iban').value.trim()) {
    showError('网络合同需要填写 IBAN');
    document.getElementById('f-iban').focus();
    return false;
  }

  return true;
}

function showError(msg) {
  const el = document.getElementById('errorTip');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ===== 提交 =====
function submitForm() {
  if (!validate()) return;

  const get = id => document.getElementById(id).value.trim();
  const typeLabel = currentType === 'energy' ? '电 / 气合同' : '网络合同';

  const lines = [
    '【' + typeLabel + '信息】',
    '─────────────────',
    '性别：' + (selectedGender === 'Herr' ? '男（Herr）' : '女（Frau）'),
    '姓：' + get('f-lastname'),
    '名：' + get('f-firstname'),
    '出生日期：' + get('f-dob'),
    '邮箱：' + get('f-email'),
    '手机号：' + get('f-phone'),
    '─────────────────',
    '街道：' + get('f-street') + ' ' + get('f-number'),
    '邮政编码：' + get('f-plz'),
    '城市：' + get('f-city'),
  ];

  // 电气专属字段
  if (currentType === 'energy') {
    const zaehler = get('f-zaehler');
    const malo = get('f-malo');
    const zaehlerSent = document.getElementById('check-zaehler').checked;
    const maloSent = document.getElementById('check-malo').checked;

    lines.push('─────────────────');
    if (zaehlerSent) {
      lines.push('电表号：（已单独发送给 Alex）');
    } else if (zaehler) {
      lines.push('电表号：' + zaehler);
    } else {
      lines.push('电表号：暂无');
    }

    if (maloSent) {
      lines.push('MaLo-ID：（已单独发送给 Alex）');
    } else if (malo) {
      lines.push('MaLo-ID：' + malo);
    } else {
      lines.push('MaLo-ID：暂无');
    }
  }

  // IBAN
  const ibanVal = get('f-iban');
  const ibanCheck = document.getElementById('iban-check');
  const hasIban = currentType === 'network' ? !!ibanVal :
                  (ibanCheck.checked && !!ibanVal);
  if (hasIban) {
    lines.push('─────────────────');
    lines.push('IBAN：' + ibanVal);
  }

  lines.push('─────────────────');
  lines.push('本人确认：以上信息依据 DSGVO Art. 6 Abs. 1 lit. b 授权用于本次合同签署与履行');

  const text = lines.join('\n');
  document.getElementById('resultText').textContent = text;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('copyBtn').style.display = 'block';

  setTimeout(() => {
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

// ===== 复制 =====
function copyResult() {
  const text = document.getElementById('resultText').textContent;
  const btn = document.getElementById('copyBtn');

  const done = () => {
    btn.textContent = '✓ 已复制！发给 Alex 就好';
    btn.classList.add('copy-success');
    setTimeout(() => {
      btn.textContent = '一键复制 · 发给 Alex';
      btn.classList.remove('copy-success');
    }, 2500);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  }
}
</script>
